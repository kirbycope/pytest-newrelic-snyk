name: Integration Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run the tests against'
        required: true
        type: choice
        options:
          - 'Test'
        default: 'Test'
      test:
        description: 'PyTest arguments (leave empty to run all tests)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:

  integration:

    name: PyTest

    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ vars.BASE_URL }}
        run: |
          pytest ${{ github.event.inputs.test }} --junitxml=results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml
